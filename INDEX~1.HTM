<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카드뉴스 공장</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080808;
  --surface: #111111;
  --surface2: #1a1a1a;
  --border: #222222;
  --text: #f0f0f0;
  --sub: #888;
  --muted: #444;
  --accent: #fff;
  --radius: 14px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Apple SD Gothic Neo', sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Login ── */
#login-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; flex-direction: column; gap: 24px;
}
.login-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 48px 40px; width: 340px; text-align: center;
}
.login-logo { font-size: 32px; margin-bottom: 8px; }
.login-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.login-sub { font-size: 13px; color: var(--sub); margin-bottom: 28px; }
.login-input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 16px; color: var(--text); font-size: 15px;
  margin-bottom: 12px; outline: none;
}
.login-input:focus { border-color: #555; }
.login-btn {
  width: 100%; background: #fff; color: #000; border: none;
  border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: opacity .15s;
}
.login-btn:hover { opacity: .85; }
.login-err { font-size: 13px; color: #ff6b6b; margin-top: 8px; }

/* ── App ── */
#app { display: none; max-width: 960px; margin: 0 auto; padding: 40px 24px 80px; }

.app-header {
  display: flex; align-items: center; gap: 14px; margin-bottom: 48px;
}
.app-logo { font-size: 28px; }
.app-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
.app-sub { font-size: 13px; color: var(--sub); margin-top: 2px; }

/* ── Section ── */
.section { margin-bottom: 32px; }
.section-label {
  font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
  color: var(--sub); margin-bottom: 12px;
}

/* ── Tabs ── */
.tab-bar {
  display: flex; gap: 4px; background: var(--surface); border-radius: 10px; padding: 4px;
  margin-bottom: 12px; width: fit-content;
}
.tab {
  padding: 7px 16px; border-radius: 7px; font-size: 13px; font-weight: 500;
  cursor: pointer; color: var(--sub); background: none; border: none; transition: all .15s;
}
.tab.active { background: var(--surface2); color: var(--text); }

/* ── Upload area ── */
.drop-zone {
  border: 1.5px dashed var(--border); border-radius: var(--radius); padding: 40px;
  text-align: center; cursor: pointer; transition: border-color .15s, background .15s;
  background: var(--surface);
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: #555; background: var(--surface2);
}
.drop-icon { font-size: 36px; margin-bottom: 10px; }
.drop-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.drop-sub { font-size: 13px; color: var(--sub); }
.drop-file-info {
  margin-top: 12px; font-size: 13px; color: #60a5fa;
  background: rgba(96,165,250,.08); border-radius: 8px; padding: 8px 14px; display: inline-block;
}
#file-input { display: none; }

/* ── Textarea ── */
.text-input {
  width: 100%; min-height: 200px; background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 16px; color: var(--text); font-size: 14px;
  line-height: 1.6; resize: vertical; outline: none; font-family: inherit;
}
.text-input:focus { border-color: #444; }
.text-input::placeholder { color: var(--muted); }

/* ── Settings row ── */
.settings-row {
  display: flex; gap: 16px; flex-wrap: wrap;
}
.setting-item { flex: 1; min-width: 180px; }
.setting-label { font-size: 12px; color: var(--sub); margin-bottom: 6px; font-weight: 500; }
.setting-select, .setting-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 12px; color: var(--text); font-size: 13px;
  outline: none; appearance: none;
}
.setting-select:focus, .setting-input:focus { border-color: #555; }

/* ── Generate button ── */
.gen-btn {
  width: 100%; padding: 16px; background: #fff; color: #000;
  border: none; border-radius: var(--radius); font-size: 16px; font-weight: 700;
  cursor: pointer; transition: opacity .15s, transform .1s;
  letter-spacing: -0.01em;
}
.gen-btn:hover { opacity: .92; }
.gen-btn:active { transform: scale(.99); }
.gen-btn:disabled { opacity: .3; cursor: not-allowed; }
.gen-btn.loading { opacity: .6; }

/* ── Progress ── */
.progress-bar-wrap {
  height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden;
  margin-top: 12px; display: none;
}
.progress-bar { height: 100%; background: #fff; width: 0%; transition: width .4s ease; }
.progress-text { font-size: 12px; color: var(--sub); margin-top: 8px; text-align: center; display: none; }

/* ── Cards grid ── */
#cards-section { display: none; }
.cards-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
}
.cards-title { font-size: 17px; font-weight: 700; }
.cards-actions { display: flex; gap: 8px; }
.action-btn {
  padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .15s; border: 1px solid var(--border);
  background: var(--surface); color: var(--text);
}
.action-btn:hover { background: var(--surface2); }
.action-btn.primary { background: #fff; color: #000; border-color: transparent; }
.action-btn.primary:hover { opacity: .88; }

.cards-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
}

/* ── Card wrapper ── */
.card-wrap { display: flex; flex-direction: column; gap: 10px; }
.card-tools { display: flex; gap: 6px; }
.card-tool-btn {
  flex: 1; padding: 7px 10px; border-radius: 7px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border); background: var(--surface);
  color: var(--sub); transition: all .15s;
}
.card-tool-btn:hover { color: var(--text); background: var(--surface2); }
.card-tool-btn.img-btn { color: #a78bfa; border-color: #a78bfa44; }
.card-tool-btn.img-btn:hover { background: #a78bfa15; }
.card-tool-btn.dl-btn { color: #34d399; border-color: #34d39944; }
.card-tool-btn.dl-btn:hover { background: #34d39915; }
.card-tool-btn.up-btn { color: #fbbf24; border-color: #fbbf2444; }
.card-tool-btn.up-btn:hover { background: #fbbf2415; }
.card-tool-btn:disabled { opacity: .4; cursor: not-allowed; }

/* ── Editable card text ── */
[contenteditable] {
  outline: none;
  cursor: text;
  border-radius: 4px;
  transition: background .15s;
}
[contenteditable]:hover { background: rgba(255,255,255,.06); }
[contenteditable]:focus { background: rgba(255,255,255,.1); box-shadow: 0 0 0 1px rgba(255,255,255,.2); }

/* ── THE CARD ── */
.card {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  background: #0a0a0a;
  cursor: default;
  user-select: none;
}

.card-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  opacity: 0; transition: opacity .5s ease;
}
.card-bg.loaded { opacity: 1; }
.card-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(160deg, rgba(0,0,0,.72) 0%, rgba(0,0,0,.88) 60%, rgba(0,0,0,.95) 100%);
}

.card-glow {
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse at 80% 10%, var(--card-accent, #ffffff) 0%, transparent 55%);
  opacity: .25;
}

.card-inner {
  position: absolute; inset: 0;
  padding: 7% 8%;
  display: flex; flex-direction: column; justify-content: space-between;
}

.card-top {
  display: flex; justify-content: space-between; align-items: flex-start;
}
.card-series {
  font-size: clamp(8px, 1.8%, 11px);
  color: rgba(255,255,255,.35);
  font-weight: 500; letter-spacing: .06em; text-transform: uppercase;
  max-width: 65%; line-height: 1.3;
}
.card-num {
  font-size: clamp(8px, 1.8%, 11px);
  color: var(--card-accent, #fff);
  font-weight: 700; letter-spacing: .04em; white-space: nowrap;
}

.card-body-area {
  display: flex; flex-direction: column; gap: 4%;
}

.card-accent-bar {
  width: clamp(20px, 8%, 36px);
  height: clamp(2px, .6%, 3px);
  background: var(--card-accent, #fff);
  border-radius: 2px;
  margin-bottom: 2%;
}

.card-headline {
  font-size: clamp(18px, 7.5%, 38px);
  font-weight: 800;
  color: #fff;
  line-height: 1.1;
  letter-spacing: -0.03em;
  word-break: keep-all;
}

.card-subheadline {
  font-size: clamp(10px, 3.2%, 16px);
  color: var(--card-accent, #aaa);
  font-weight: 500;
  line-height: 1.3;
  word-break: keep-all;
}

.card-text {
  font-size: clamp(9px, 2.8%, 14px);
  color: rgba(255,255,255,.55);
  line-height: 1.6;
  word-break: keep-all;
  font-weight: 400;
}

.card-bottom {
  display: flex; align-items: center; gap: 8px;
}
.card-bottom-line {
  flex: 1; height: 1px;
  background: linear-gradient(to right, var(--card-accent, #fff), transparent);
  opacity: .3;
}

/* ── Image loading indicator ── */
.img-loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.7); font-size: 12px; color: var(--sub);
  gap: 8px;
}
.spinner {
  width: 16px; height: 16px; border: 2px solid #333;
  border-top-color: #fff; border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
  background: #fff; color: #000; padding: 12px 20px; border-radius: 10px;
  font-size: 14px; font-weight: 600; z-index: 9999;
  opacity: 0; transition: opacity .2s; pointer-events: none;
}
.toast.show { opacity: 1; }

/* ── Status badges ── */
.status-row { display: flex; gap: 8px; margin-bottom: 20px; }
.status-badge {
  padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
  display: flex; align-items: center; gap: 4px;
}
.status-badge.ok { background: #34d39915; color: #34d399; border: 1px solid #34d39930; }
.status-badge.err { background: #f4727215; color: #f47272; border: 1px solid #f4727230; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🎨</div>
    <div class="login-title">카드뉴스 공장</div>
    <div class="login-sub">비공개 접근 — 키를 입력하세요</div>
    <input class="login-input" type="password" id="login-key" placeholder="액세스 키" autocomplete="off">
    <button class="login-btn" onclick="doLogin()">입장</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="app-header">
    <div class="app-logo">🎨</div>
    <div>
      <div class="app-title">카드뉴스 공장</div>
      <div class="app-sub">텍스트·PDF → 인스타그램 카드뉴스 자동 생성</div>
    </div>
  </div>

  <!-- API Status -->
  <div class="status-row" id="status-row"></div>

  <!-- Step 1: Input -->
  <div class="section">
    <div class="section-label">Step 1 — 콘텐츠 입력</div>
    <div class="tab-bar">
      <button class="tab active" onclick="switchTab('text')">텍스트 직접 입력</button>
      <button class="tab" onclick="switchTab('file')">PDF / 파일 업로드</button>
    </div>

    <!-- Text tab -->
    <div id="tab-text">
      <textarea class="text-input" id="text-input"
        placeholder="번역할 텍스트 또는 인사이트를 여기에 붙여넣으세요.
영어도 OK — Claude가 한국어 카드뉴스로 자동 변환합니다."></textarea>
    </div>

    <!-- File tab -->
    <div id="tab-file" style="display:none">
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <div class="drop-icon">📄</div>
        <div class="drop-title">파일을 드래그하거나 클릭해서 업로드</div>
        <div class="drop-sub">PDF, TXT 지원 · 최대 30MB</div>
        <div class="drop-file-info" id="file-info" style="display:none"></div>
      </div>
      <input type="file" id="file-input" accept=".pdf,.txt,.md" onchange="onFileSelect(this)">
    </div>
  </div>

  <!-- Step 2: Settings -->
  <div class="section">
    <div class="section-label">Step 2 — 설정</div>
    <div class="settings-row">
      <div class="setting-item">
        <div class="setting-label">카드 장수</div>
        <select class="setting-select" id="card-count">
          <option value="5">5장</option>
          <option value="6">6장</option>
          <option value="7" selected>7장</option>
          <option value="8">8장</option>
          <option value="9">9장</option>
        </select>
      </div>
      <div class="setting-item">
        <div class="setting-label">추가 키워드 / 방향 (선택)</div>
        <input class="setting-input" type="text" id="topic-input" placeholder="예: 마케팅, MZ세대, 창업">
      </div>
    </div>
  </div>

  <!-- Generate -->
  <div class="section">
    <button class="gen-btn" id="gen-btn" onclick="generate()">✦ 카드뉴스 생성</button>
    <div class="progress-bar-wrap" id="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="progress-text" id="progress-text"></div>
  </div>

  <!-- Cards output -->
  <div id="cards-section">
    <div class="cards-header">
      <div class="cards-title" id="series-title"></div>
      <div class="cards-actions">
        <button class="action-btn" onclick="generateAllImages()">🖼 전체 이미지 생성</button>
        <button class="action-btn primary" onclick="downloadAll()">⬇ 전체 다운로드</button>
      </div>
    </div>
    <div class="cards-grid" id="cards-grid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let ADMIN_KEY = '';
let cardData = [];
let currentFile = null;
let activeTab = 'text';

// ─── Login ───────────────────────────────────────────────────
async function doLogin() {
  const key = document.getElementById('login-key').value.trim();
  if (!key) return;
  try {
    const r = await fetch('/api/status', { headers: { 'x-admin-key': key } });
    if (r.status === 401) {
      document.getElementById('login-err').textContent = '키가 틀렸습니다';
      return;
    }
    ADMIN_KEY = key;
    sessionStorage.setItem('ak', key);
    const status = await r.json();
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    showStatus(status);
  } catch(e) {
    document.getElementById('login-err').textContent = '연결 오류: ' + e.message;
  }
}

document.getElementById('login-key').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// Auto-login from sessionStorage
window.addEventListener('load', () => {
  const saved = sessionStorage.getItem('ak');
  if (saved) {
    document.getElementById('login-key').value = saved;
    doLogin();
  }
});

function showStatus(s) {
  const el = document.getElementById('status-row');
  el.innerHTML = `
    <div class="status-badge ${s.anthropic ? 'ok' : 'err'}">
      ${s.anthropic ? '✓' : '✗'} Claude API
    </div>
    <div class="status-badge ${s.openai ? 'ok' : 'err'}">
      ${s.openai ? '✓' : '✗'} DALL-E API
    </div>`;
}

// ─── Tabs ────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', (i===0 && tab==='text') || (i===1 && tab==='file'));
  });
  document.getElementById('tab-text').style.display = tab==='text' ? '' : 'none';
  document.getElementById('tab-file').style.display = tab==='file' ? '' : 'none';
}

// ─── File upload ─────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f) setFile(f);
});

function onFileSelect(input) { if (input.files[0]) setFile(input.files[0]); }
function setFile(f) {
  currentFile = f;
  const info = document.getElementById('file-info');
  info.style.display = '';
  info.textContent = `📎 ${f.name} (${(f.size/1024/1024).toFixed(1)}MB)`;
}

// ─── Generate ────────────────────────────────────────────────
function setProgress(pct, msg) {
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('progress-text').style.display = 'block';
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = msg;
}

function clearProgress() {
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('progress-text').style.display = 'none';
  document.getElementById('progress-bar').style.width = '0%';
}

async function generate() {
  const btn = document.getElementById('gen-btn');
  btn.disabled = true; btn.classList.add('loading'); btn.textContent = '생성 중...';

  try {
    // Step 1: Get text
    let text = '';
    setProgress(10, '텍스트 준비 중...');

    if (activeTab === 'file' && currentFile) {
      const fd = new FormData();
      fd.append('file', currentFile);
      const r = await api('/api/extract', null, { method:'POST', body: fd, noJson: true });
      const d = await r.json();
      if (d.error) throw new Error(d.error);
      text = d.text;
    } else {
      text = document.getElementById('text-input').value.trim();
      if (!text) throw new Error('텍스트를 입력해주세요');
      const r = await api('/api/extract', { text });
      if (r.error) throw new Error(r.error);
      text = r.text;
    }

    // Step 2: Generate cards
    setProgress(40, 'Claude가 카드뉴스 작성 중...');
    const cardCount = parseInt(document.getElementById('card-count').value);
    const topic = document.getElementById('topic-input').value.trim();
    const result = await api('/api/generate', { text, cardCount, topic });
    if (result.error) throw new Error(result.error);

    cardData = result.cards;
    setProgress(90, '카드 렌더링 중...');
    renderCards(result);
    setProgress(100, '완료!');
    setTimeout(clearProgress, 800);
  } catch(e) {
    clearProgress();
    toast('오류: ' + e.message, true);
  } finally {
    btn.disabled = false; btn.classList.remove('loading'); btn.textContent = '✦ 카드뉴스 생성';
  }
}

async function api(endpoint, body, opts = {}) {
  if (opts.noJson) {
    // FormData
    const r = await fetch(endpoint, { ...opts, headers: { 'x-admin-key': ADMIN_KEY, ...(opts.headers||{}) } });
    return r;
  }
  const r = await fetch(endpoint, {
    method: body ? 'POST' : 'GET',
    headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
    body: body ? JSON.stringify(body) : undefined,
  });
  return r.json();
}

// ─── Render cards ─────────────────────────────────────────────
function renderCards(result) {
  const section = document.getElementById('cards-section');
  const grid = document.getElementById('cards-grid');
  const titleEl = document.getElementById('series-title');

  titleEl.textContent = result.seriesTitle || '카드뉴스 시리즈';
  grid.innerHTML = '';

  result.cards.forEach((card, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';
    wrap.innerHTML = `
      <div class="card" id="card-${i}" style="--card-accent:${card.accent}">
        <div class="card-bg" id="bg-${i}"></div>
        <div class="card-overlay"></div>
        <div class="card-glow"></div>
        <div class="card-inner">
          <div class="card-top">
            <div class="card-series">${result.seriesTitle || ''}</div>
            <div class="card-num">${String(card.number).padStart(2,'0')} / ${String(result.cards.length).padStart(2,'0')}</div>
          </div>
          <div class="card-body-area">
            <div class="card-accent-bar"></div>
            <div class="card-headline" contenteditable="true" spellcheck="false"
              onblur="saveEdit(${i},'headline',this)">${escHtml(card.headline)}</div>
            ${card.subheadline ? `<div class="card-subheadline" contenteditable="true" spellcheck="false"
              onblur="saveEdit(${i},'subheadline',this)">${escHtml(card.subheadline)}</div>` : ''}
            <div class="card-text" contenteditable="true" spellcheck="false"
              onblur="saveEdit(${i},'body',this)">${escHtml(card.body)}</div>
          </div>
          <div class="card-bottom">
            <div class="card-bottom-line"></div>
          </div>
        </div>
      </div>
      <div class="card-tools">
        <button class="card-tool-btn img-btn" id="imgbtn-${i}"
          onclick="generateImage(${i})" title="${escHtml(card.imagePrompt||'')}">
          🖼 AI 생성
        </button>
        <button class="card-tool-btn up-btn" onclick="triggerUpload(${i})">
          📁 내 사진
        </button>
        <button class="card-tool-btn dl-btn" onclick="downloadCard(${i})">
          ⬇ PNG
        </button>
      </div>
      <input type="file" id="imgupload-${i}" accept="image/*" style="display:none"
        onchange="applyUploadedImage(${i}, this)">`;
    grid.appendChild(wrap);
  });

  section.style.display = 'block';
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Image generation ─────────────────────────────────────────
async function generateImage(i) {
  const card = cardData[i];
  if (!card?.imagePrompt) return toast('이미지 프롬프트 없음');
  const btn = document.getElementById('imgbtn-' + i);
  const cardEl = document.getElementById('card-' + i);
  btn.disabled = true; btn.textContent = '생성 중...';

  // Loading overlay
  const overlay = document.createElement('div');
  overlay.className = 'img-loading';
  overlay.id = 'imgload-' + i;
  overlay.innerHTML = '<div class="spinner"></div><span>AI 이미지 생성 중...</span>';
  cardEl.appendChild(overlay);

  try {
    const result = await api('/api/image', { prompt: card.imagePrompt });
    if (result.error) throw new Error(result.error);

    const bgEl = document.getElementById('bg-' + i);
    bgEl.style.backgroundImage = `url(${result.imageData})`;
    // Store for export
    cardEl.dataset.imgData = result.imageData;
    requestAnimationFrame(() => bgEl.classList.add('loaded'));
    btn.textContent = '✓ 이미지 적용됨';
  } catch(e) {
    btn.disabled = false; btn.textContent = '🖼 이미지 생성';
    toast('이미지 오류: ' + e.message, true);
  } finally {
    document.getElementById('imgload-' + i)?.remove();
  }
}

async function generateAllImages() {
  for (let i = 0; i < cardData.length; i++) {
    await generateImage(i);
    await new Promise(r => setTimeout(r, 800));
  }
  toast('전체 이미지 생성 완료!');
}

// ─── Download ─────────────────────────────────────────────────
async function captureCard(i) {
  const cardEl = document.getElementById('card-' + i);
  const bgEl   = document.getElementById('bg-' + i);

  // 캡처 전 문제 요소 임시 제거
  const glow = cardEl.querySelector('.card-glow');
  const hasImg = bgEl && bgEl.classList.contains('loaded');

  if (glow) glow.style.display = 'none';
  if (bgEl && !hasImg) bgEl.style.display = 'none';

  // 카드 크기 기반으로 1080px 스케일 계산
  const w = cardEl.offsetWidth || 320;
  const scale = 1080 / w;

  let canvas;
  try {
    canvas = await html2canvas(cardEl, {
      scale: scale,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#0a0a0a',
      logging: false,
    });
  } finally {
    // 원상 복구
    if (glow) glow.style.display = '';
    if (bgEl && !hasImg) bgEl.style.display = '';
  }
  return canvas;
}

async function downloadCard(i) {
  const btn = document.querySelectorAll('.dl-btn')[i];
  btn.textContent = '저장 중...'; btn.disabled = true;
  try {
    const canvas = await captureCard(i);
    const a = document.createElement('a');
    a.download = `card_${String(i+1).padStart(2,'0')}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  } catch(e) {
    toast('다운로드 실패: ' + e.message, true);
  } finally {
    btn.textContent = '⬇ PNG 저장'; btn.disabled = false;
  }
}

async function downloadAll() {
  const dlBtn = document.querySelector('.action-btn.primary');
  dlBtn.textContent = '준비 중...'; dlBtn.disabled = true;

  try {
    const zip = new JSZip();
    const total = cardData.length;
    for (let i = 0; i < total; i++) {
      setProgress(Math.round((i/total)*90), `카드 ${i+1}/${total} 캡처 중...`);
      const canvas = await captureCard(i);
      const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
      zip.file(`card_${String(i+1).padStart(2,'0')}.png`, blob);
      await new Promise(r => setTimeout(r, 200));
    }
    setProgress(95, 'ZIP 압축 중...');
    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(zipBlob);
    a.download = 'cardnews.zip';
    a.click();
    clearProgress();
    toast('전체 다운로드 완료!');
  } catch(e) {
    clearProgress();
    toast('오류: ' + e.message, true);
  } finally {
    dlBtn.textContent = '⬇ 전체 다운로드'; dlBtn.disabled = false;
  }
}

// ─── Image upload (user's own photo) ──────────────────────────
function triggerUpload(i) {
  document.getElementById('imgupload-' + i).click();
}

function applyUploadedImage(i, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const dataUrl = e.target.result;
    const cardEl = document.getElementById('card-' + i);
    const bgEl = document.getElementById('bg-' + i);
    bgEl.style.backgroundImage = `url(${dataUrl})`;
    bgEl.classList.add('loaded');
    cardEl.dataset.imgData = dataUrl;
    document.getElementById('imgbtn-' + i).textContent = '✓ 이미지 적용됨';
    toast('이미지가 적용됐습니다');
  };
  reader.readAsDataURL(file);
  input.value = '';
}

// ─── Inline edit ─────────────────────────────
function saveEdit(i, field, el) {
  if (!cardData[i]) return;
  cardData[i][field] = el.innerText.trim();
}

// ─── Toast ─────────────────────────────────
function toast(msg, isErr) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = isErr ? '#ff6b6b' : '#fff';
  el.style.color = isErr ? '#fff' : '#000';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
</body>
</html>
